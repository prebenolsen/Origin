<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#1a1723"/>
      <stop offset="100%" stop-color="#0c0b10"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f7c766"/>
      <stop offset="100%" stop-color="#e89a2c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- "Origin point": concentric rings emanating from a single source -->
  <circle cx="256" cy="256" r="196" stroke="#f5b544" stroke-opacity="0.14" stroke-width="10"/>
  <circle cx="256" cy="256" r="148" stroke="#f5b544" stroke-opacity="0.28" stroke-width="12"/>
  <circle cx="256" cy="256" r="100" stroke="url(#ring)" stroke-width="16"/>
  <circle cx="256" cy="256" r="40" fill="url(#ring)"/>
